name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: 'stable'

      - name: Create Flutter project
        run: |
          flutter create --org com.example gomoku

      - name: Replace source code
        run: |
          rm -rf gomoku/lib
          cp -r lib gomoku/
          cp pubspec.yaml gomoku/

      - name: Analyze code
        run: |
          cd gomoku
          flutter analyze

      - name: Build APK
        run: |
          cd gomoku
          flutter pub get
          flutter build apk --release --verbose

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: gomoku-apk
          path: gomoku/build/app/outputs/flutter-apk/app-release.apk
